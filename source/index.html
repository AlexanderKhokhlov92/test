<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Качество Исполнения</title>
    <link rel="stylesheet" href="css/style.min.css" />
  </head>
  <body>
    <div class="page-container">
      <header class="header">
        <nav class="header_navigation">
          <ul class="header_navigation-list">
            <li class="header_navigation-list-item">
              <a class="header_navigation-list-link" href="">Text</a>
            </li>
            <li class="header_navigation-list-item">
              <a class="header_navigation-list-link" href="">Text</a>
            </li>
            <li class="header_navigation-list-item">
              <a class="header_navigation-list-link" href="">Text</a>
            </li>
            <li class="header_navigation-list-item">
              <a class="header_navigation-list-link" href="">Text</a>
            </li>
            <li>
              <label class="popup-btn burger-open" for="popup-toggle"
                >Open pop-up button</label
              >
            </li>
          </ul>
        </nav>
        <button class="header_burger-button">
          <div class="header_burger-button-icon"></div>
        </button>
      </header>
      <main class="main">
        <section class="slider">
          <ul class="slide-list">
            <li class="slide">
              <h1 class="slide_title">H1 text</h1>
              <label class="popup-btn --ml" for="popup-toggle"
                >Open pop-up button</label
              >
            </li>
            <li class="slide">
              <h1 class="slide_title">2nd slide</h1>
              <label class="popup-btn --ml" for="popup-toggle"
                >Open pop-up button</label
              >
            </li>
          </ul>
          <button class="slide_button --left">
            <img src="img/left-arrow.svg" alt="" />
          </button>
          <button class="slide_button --right">
            <img src="img/right-arrow.svg" alt="" />
          </button>
        </section>
        <section class="blocks-2">
          <h2 class="blocks-2_title">H2 text</h2>
          <ul class="blocks-2_list">
            <li class="blocks-2_list-item block-1"></li>
            <li class="blocks-2_list-item block-2"></li>
            <li class="blocks-2_list-item block-3"></li>
            <li class="blocks-2_list-item block-4"></li>
          </ul>
        </section>
        <section class="blocks-3">
          <h2 class="blocks-3_title">H2 text</h2>
          <ul class="blocks-3_list">
            <li class="blocks-3_list-item"></li>
            <li class="blocks-3_list-item"></li>
            <li class="blocks-3_list-item"></li>
            <li class="blocks-3_list-item"></li>
            <li class="blocks-3_list-item"></li>
          </ul>
          <p class="block-3_description">Text utp</p>
          <label class="popup-btn --b3" for="popup-toggle"
            >Open pop-up button</label
          >
        </section>
      </main>
      <footer class="footer">
        <ul class="footer_nav-list">
          <li class="footer_nav-list-item">
            <a class="footer_nav_link" href="">Text</a>
          </li>
          <li class="footer_nav-list-item">
            <a class="footer_nav_link" href="">Text</a>
          </li>
          <li class="footer_nav-list-item">
            <a class="footer_nav_link" href="">Text</a>
          </li>
          <li class="footer_nav-list-item">
            <a class="footer_nav_link" href="">Text</a>
          </li>
        </ul>
      </footer>
      <section>
        <input type="checkbox" id="popup-toggle" class="popup-toggle" />
        <!-- Попап -->
        <div class="popup">
          <label for="popup-toggle" class="overlay"></label>
          <div class="popup-inner">
            <label for="popup-toggle" class="close-popup-button">✖</label>
            <h2 class="pop-up_title">Pop-up</h2>
          </div>
        </div>
      </section>
    </div>

    <script src="js/index.min.js"></script>
  </body>
</html>
